# ============================================================
# docker-compose.yml — University Lab Equipment Platform
# Complete orchestration of all services and infrastructure
#
# Startup Order:
# 1. postgres-booking, postgres-equipment, rabbitmq, zipkin
# 2. config-server (waits for nothing but itself)
# 3. eureka-server (waits for config-server)
# 4. api-gateway, booking-service, equipment-service (wait for eureka)
#
# Usage:
#   docker-compose up -d
#   docker-compose logs -f booking-service
#   docker-compose down -v  # destroy volumes too
# ============================================================

# ============================================================
# NETWORKS
# ============================================================
networks:
  lab-platform-network:
    driver: bridge
    name: lab-platform-network

# ============================================================
# VOLUMES
# ============================================================
volumes:
  postgres-booking-data:
    name: lab-platform-booking-db
  postgres-equipment-data:
    name: lab-platform-equipment-db
  rabbitmq-data:
    name: lab-platform-rabbitmq

# ============================================================
# SERVICES
# ============================================================
services:

  # ----------------------------------------------------------
  # INFRASTRUCTURE: PostgreSQL for Booking Service
  # ----------------------------------------------------------
  postgres-booking:
    image: postgres:16-alpine
    container_name: postgres-booking
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: ${BOOKING_DB_USERNAME:-bookinguser}
      POSTGRES_PASSWORD: ${BOOKING_DB_PASSWORD:-bookingpass}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-booking-data:/var/lib/postgresql/data
      - ./docker/sql/booking-db-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    networks:
      - lab-platform-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BOOKING_DB_USERNAME:-bookinguser} -d booking_db && psql -U ${BOOKING_DB_USERNAME:-bookinguser} -d booking_db -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ----------------------------------------------------------
  # INFRASTRUCTURE: PostgreSQL for Equipment Service
  # ----------------------------------------------------------
  postgres-equipment:
    image: postgres:16-alpine
    container_name: postgres-equipment
    environment:
      POSTGRES_DB: equipment_db
      POSTGRES_USER: ${EQUIPMENT_DB_USERNAME:-equipmentuser}
      POSTGRES_PASSWORD: ${EQUIPMENT_DB_PASSWORD:-equipmentpass}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-equipment-data:/var/lib/postgresql/data
      - ./docker/sql/equipment-db-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5433:5432"
    networks:
      - lab-platform-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EQUIPMENT_DB_USERNAME:-equipmentuser} -d equipment_db && psql -U ${EQUIPMENT_DB_USERNAME:-equipmentuser} -d equipment_db -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ----------------------------------------------------------
  # INFRASTRUCTURE: RabbitMQ — Message Broker
  # ----------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"     # AMQP protocol
      - "15672:15672"   # Management UI
    networks:
      - lab-platform-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ----------------------------------------------------------
  # OBSERVABILITY: Zipkin — Distributed Tracing
  # ----------------------------------------------------------
  zipkin:
    image: openzipkin/zipkin:3
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - lab-platform-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ----------------------------------------------------------
  # INFRASTRUCTURE: Redis — Rate Limiting (prod profile)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - lab-platform-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ----------------------------------------------------------
  # SERVICE 1: Spring Cloud Config Server
  # ----------------------------------------------------------
  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    deploy:
      replicas: 2
    environment:
      SPRING_PROFILES_ACTIVE: native
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configpass}
      EUREKA_URI: http://${EUREKA_USERNAME:-eurekauser}:${EUREKA_PASSWORD:-eurekapass}@eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-must-be-at-least-256-bits-long-for-HS256}
    networks:
      - lab-platform-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://configuser:configpass@localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ----------------------------------------------------------
  # SERVICE 2: Netflix Eureka Discovery Server
  # ----------------------------------------------------------
  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: eureka-server
    environment:
      SPRING_PROFILES_ACTIVE: default
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eurekauser}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eurekapass}
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - lab-platform-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # ----------------------------------------------------------
  # SERVICE 3: API Gateway
  # ----------------------------------------------------------
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    deploy:
      replicas: 2
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_SERVER_HOST: config-server
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configpass}
      EUREKA_URI: http://${EUREKA_USERNAME:-eurekauser}:${EUREKA_PASSWORD:-eurekapass}@eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-must-be-at-least-256-bits-long-for-HS256}
      ZIPKIN_HOST: zipkin
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - lab-platform-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # ----------------------------------------------------------
  # SERVICE 3.5: Nginx Load Balancer for API Gateway
  # ----------------------------------------------------------
  nginx-load-balancer:
    image: nginx:alpine
    container_name: nginx-load-balancer
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
    networks:
      - lab-platform-network

  # ----------------------------------------------------------
  # SERVICE 4: Booking Service
  # ----------------------------------------------------------
  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    container_name: booking-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_SERVER_HOST: config-server
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configpass}
      DB_HOST: postgres-booking
      DB_USERNAME: ${BOOKING_DB_USERNAME:-bookinguser}
      DB_PASSWORD: ${BOOKING_DB_PASSWORD:-bookingpass}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      EUREKA_URI: http://${EUREKA_USERNAME:-eurekauser}:${EUREKA_PASSWORD:-eurekapass}@eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-must-be-at-least-256-bits-long-for-HS256}
      ZIPKIN_HOST: zipkin
    # NOTE: Ports 8081/8082 are NOT exposed externally.
    # All client access goes through the API Gateway on port 8080.
    # This enforces the gateway-first security model.
    depends_on:
      postgres-booking:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - lab-platform-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # ----------------------------------------------------------
  # SERVICE 5: Equipment Service
  # ----------------------------------------------------------
  equipment-service:
    build:
      context: .
      dockerfile: equipment-service/Dockerfile
    container_name: equipment-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_SERVER_HOST: config-server
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configpass}
      DB_HOST: postgres-equipment
      DB_USERNAME: ${EQUIPMENT_DB_USERNAME:-equipmentuser}
      DB_PASSWORD: ${EQUIPMENT_DB_PASSWORD:-equipmentpass}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      EUREKA_URI: http://${EUREKA_USERNAME:-eurekauser}:${EUREKA_PASSWORD:-eurekapass}@eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-must-be-at-least-256-bits-long-for-HS256}
      ZIPKIN_HOST: zipkin
    # NOTE: Ports 8081/8082 are NOT exposed externally.
    # All client access goes through the API Gateway on port 8080.
    # This enforces the gateway-first security model.
    depends_on:
      postgres-equipment:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - lab-platform-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped
