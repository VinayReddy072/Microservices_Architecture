server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config-repo
        # Uncomment for Git-backed config in production:
        # git:
        #   uri: ${CONFIG_GIT_URI:https://github.com/your-org/lab-platform-config}
        #   clone-on-start: true
        #   default-label: main
        encrypt:
          enabled: false
  security:
    user:
      name: ${CONFIG_SERVER_USERNAME:configuser}
      password: ${CONFIG_SERVER_PASSWORD:configpass}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,bus-refresh
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  application:
    name: ${spring.application.name}
    description: Centralized Configuration Server
    version: 1.0.0

logging:
  level:
    com.labplatform: DEBUG
    org.springframework.cloud.config: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId},%X{spanId}] %logger{36} - %msg%n"
