# ============================================================
# equipment-service-prod.yml — Equipment Service PROD profile
# ============================================================

server:
  port: 8082
  tomcat:
    max-threads: 200

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres-equipment}:5432/equipment_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      pool-name: EquipmentHikariPool
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 3
        max-concurrency: 10

jwt:
  secret: ${JWT_SECRET}

equipment:
  maintenance:
    usage-threshold: 10
  availability:
    cache-ttl-seconds: 30

logging:
  level:
    com.labplatform.equipment: WARN
    root: WARN
  file:
    name: /var/log/equipment-service/application.log
    max-size: 50MB
    max-history: 30

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka-server:8761/eureka}
  instance:
    prefer-ip-address: true
    metadata-map:
      version: 1.0.0
      environment: prod

equipment:
  booking:
    queue:
      name: equipment.booking.queue

management:
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:zipkin}:9411/api/v2/spans
  tracing:
    sampling:
      probability: 0.1  # 10% sampling in production
